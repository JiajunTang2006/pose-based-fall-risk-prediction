<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="settings.pageTitle">FallGuard Settings</title>
    <link rel="stylesheet" href="/static/styles-settings.css" />
  </head>
  <body>
    <div class="settings-window">
      <div class="settings-header">
        <h1><span class="nav-icon settings"></span> <span data-i18n="settings.title">Settings</span></h1>
      </div>

      <div class="settings-body">
        <!-- General -->
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settings.general">General</div>
          <div class="settings-item">
            <span data-i18n="settings.language">Language</span>
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="zh">中文</option>
            </select>
          </div>
          <div class="settings-item">
            <span data-i18n="settings.theme">Theme</span>
            <select id="themeSelect">
              <option value="system" data-i18n="settings.themeSystem">System</option>
              <option value="light" data-i18n="settings.themeLight">Light</option>
              <option value="dark" data-i18n="settings.themeDark">Dark</option>
            </select>
          </div>
        </div>

        <!-- Detection -->
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settings.detection">Detection</div>
          <div class="settings-item">
            <span data-i18n="settings.sensitivity">Sensitivity</span>
            <select id="sensitivitySelect">
              <option value="low" data-i18n="settings.sensitivityLow">Low</option>
              <option value="medium" data-i18n="settings.sensitivityMedium">Medium</option>
              <option value="high" data-i18n="settings.sensitivityHigh">High</option>
            </select>
          </div>
        </div>

        <!-- Profiles -->
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settings.profiles">Profiles</div>
          <div id="profileList" class="profile-list">
            <!-- Dynamically populated -->
          </div>
          <div class="add-profile-row">
            <input id="newProfileName" type="text" class="profile-name-input" data-i18n-placeholder="settings.addProfilePlaceholder" placeholder="Add profile name..." maxlength="20" />
            <button id="addProfileButton" class="add-profile-btn" data-i18n="settings.addProfile">+ Add</button>
          </div>
        </div>

        <!-- About -->
        <div class="settings-section">
          <div class="settings-section-title" data-i18n="settings.about">About</div>
          <div class="settings-about">
            <strong data-i18n="brand.name">FallGuard</strong>
            <span id="settingsVersion">v0.2.0</span>
          </div>
        </div>
      </div>
    </div>

    <script src="/static/i18n.js"></script>
    <script src="/static/settings.js"></script>
  </body>
</html>
